name: check-script-rewrite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: read

jobs:
  check-rewrite:
    runs-on: ubuntu-latest

    env:
      FIGMA_EMAIL: ${{ secrets.FIGMA_EMAIL }}
      FIGMA_PASSWORD: ${{ secrets.FIGMA_PASSWORD }}
      FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @tempad-dev/extension...

      - name: Install browser runtime
        run: pnpm --filter @tempad-dev/extension test:setup

      - name: Run check script
        run: pnpm --filter @tempad-dev/extension check:rewrite
