name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: 'Test (Vitest: browser project)'
        run: |
          set +e
          timeout --signal=TERM --kill-after=10s 180s pnpm exec vitest run --project extension-browser
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Browser Vitest failed or timed out with exit code $status"
            echo "::group::Process list"
            ps -eo pid,ppid,stat,time,comm,args
            echo "::endgroup::"
            echo "::group::Matching processes"
            pgrep -af 'node|vite|vitest|chrome|playwright' || true
            echo "::endgroup::"
            echo "::group::Process tree"
            pstree -ap || true
            echo "::endgroup::"
            exit "$status"
          fi

      - name: 'Test (Vitest: non-browser projects)'
        run: |
          set +e
          timeout --signal=TERM --kill-after=10s 180s pnpm exec vitest run \
            --project extension-node \
            --project mcp-server \
            --project plugins \
            --project shared
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Non-browser Vitest failed or timed out with exit code $status"
            echo "::group::Process list"
            ps -eo pid,ppid,stat,time,comm,args
            echo "::endgroup::"
            echo "::group::Matching processes"
            pgrep -af 'node|vite|vitest|chrome|playwright' || true
            echo "::endgroup::"
            echo "::group::Process tree"
            pstree -ap || true
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Test (worker sandbox)
        run: pnpm --filter @tempad-dev/extension check:worker-sandbox

      - name: Format check
        run: pnpm format:check

      - name: Build project
        run: pnpm build
